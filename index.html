<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROHLI PLAYER</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('Cantik.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: #fff; 
            font-family: sans-serif; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }
        .header { 
            padding: 20px; 
            text-align: center; 
            background: rgba(0,0,0,0.5); 
            backdrop-filter: blur(5px);
        }
        audio { width: 100%; margin: 15px 0; filter: invert(1); }
        .controls { display: flex; gap: 10px; justify-content: center; }
        button { padding: 10px 20px; border: none; border-radius: 5px; background: #1db954; color: #fff; font-weight: bold; }
        .playlist { flex-grow: 1; overflow-y: auto; padding: 20px; background: rgba(0,0,0,0.3); }
        .song { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .active { background: rgba(29, 185, 84, 0.2); color: #1db954; }
    </style>
</head>
<body>
    <div class="header">
        <h2 id="title">ROHLI PLAYER</h2>
        <audio id="audio" controls></audio>
        <div class="controls">
            <button onclick="prev()">PREV</button>
            <button onclick="next()">NEXT</button>
        </div>
    </div>
    <div class="playlist" id="list"></div>
    <script>
        const songs = ["Arabic.mp3", "Benciku sangka sayang.mp3", "Evi Tamala Aku rindu padamu.mp3", "Yaa toiba.mp3", "Poppy mercury.mp3", "Purnama Merindu.mp3", "Terbuai mimpi.mp3", "Zaenal.mp3", "Terguncang.mp3", "Trauma.mp3"];
        let current = 0;
        const a = document.getElementById('audio'), t = document.getElementById('title'), l = document.getElementById('list');
        function render() { l.innerHTML = songs.map((s, i) => `<div class="song ${i===current?'active':''}" onclick="playSong(${i})">${i+1}. ${s}</div>`).join(''); }
        function playSong(i) { current = i; a.src = songs[current]; t.innerText = songs[current].replace('.mp3',''); render(); a.play(); }
        function next() { current = (current + 1) % songs.length; playSong(current); }
        function prev() { current = (current - 1 + songs.length) % songs.length; playSong(current); }
        a.onended = next;
        render(); playSong(0); a.pause();
    </script>
</body>
</html>
