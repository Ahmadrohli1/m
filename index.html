<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROHLI PLAYER PRO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)), url('Cantik.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: #fff; 
            font-family: sans-serif; 
            height: 100vh; 
            display: flex; 
            flex-direction: column;
            overflow: hidden;
        }
        
        /* Navigasi Atas */
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px; 
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(5px);
        }
        .menu-icon { font-size: 28px; cursor: pointer; }

        /* Area Player */
        .main-player { 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center;
            padding: 20px;
        }
        #t { font-size: 1.4rem; color: #1db954; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 2px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        
        .controls { display: flex; gap: 30px; align-items: center; }
        .btn-play { width: 80px; height: 80px; border-radius: 50%; background: #fff; color: #000; border: none; font-size: 30px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .btn-step { background: none; border: none; color: #fff; font-size: 40px; cursor: pointer; }

        /* Sidebar Playlist */
        .sidebar {
            position: fixed; top: 0; right: -100%; width: 85%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(15px);
            transition: 0.5s ease; z-index: 1000; padding: 25px;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
        }
        .sidebar.active { right: 0; }
        .close-menu { font-size: 40px; color: #fff; cursor: pointer; display: block; text-align: right; margin-bottom: 20px; }
        .list-wrapper { height: 85%; overflow-y: auto; }
        .song-box { padding: 18px 10px; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer; font-size: 1.1rem; }
        .song-box.playing { color: #1db954; font-weight: bold; background: rgba(29, 185, 84, 0.1); border-radius: 8px; }
    </style>
</head>
<body>
    <div class="header">
        <span style="font-weight: bold; letter-spacing: 1px;">ROHLI PLAYER</span>
        <div class="menu-icon" onclick="toggleM()">☰</div>
    </div>

    <div class="main-player">
        <h2 id="t">MEMUAT...</h2>
        <div class="controls">
            <button class="btn-step" onclick="c(-1)">⏮</button>
            <button class="btn-play" id="pB" onclick="tP()">▶</button>
            <button class="btn-step" onclick="c(1)">⏭</button>
        </div>
        <audio id="a"></audio>
    </div>

    <div class="sidebar" id="sb">
        <span class="close-menu" onclick="toggleM()">×</span>
        <div class="list-wrapper" id="list"></div>
    </div>

    <script>
        // Daftar lagu akan diisi otomatis oleh update.sh kamu
        const s = ["9mm.mp3", "Arabic.mp3", "Benciku_sangka_sayang.mp3", "Evi_Tamala_Aku_rindu_padamu.mp3", "Yaa_toiba.mp3"];
        let i = 0;
        const a = document.getElementById('a'), t = document.getElementById('t'), l = document.getElementById('list'), pB = document.getElementById('pB'), sb = document.getElementById('sb');

        function toggleM() { sb.classList.toggle('active'); }
        
        function build() { 
            l.innerHTML = s.map((n, idx) => `
                <div class="song-box ${idx===i?'playing':''}" onclick="lS(${idx}); toggleM();">
                    ${idx+1}. ${n.replace('.mp3','').replace(/_/g,' ')}
                </div>`).join(''); 
        }

        function lS(x) { 
            i = x; a.src = s[i]; t.innerText = s[i].replace('.mp3','').replace(/_/g,' ').toUpperCase(); 
            build(); a.play(); pB.innerText = "⏸"; 
        }

        function tP() { 
            if(a.paused){ a.play(); pB.innerText="⏸"; } 
            else { a.pause(); pB.innerText="▶"; } 
        }

        function c(d) { i = (i + d + s.length) % s.length; lS(i); }
        a.onended = () => c(1);
        
        build(); lS(0); a.pause();
    </script>
</body>
</html>
