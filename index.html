<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-Player</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 50px 20px; }
        .player { background: #111; padding: 30px; border-radius: 20px; border: 1px solid #333; display: inline-block; width: 100%; max-width: 350px; }
        audio { width: 100%; margin: 20px 0; filter: invert(1); }
        button { width: 45%; padding: 12px; background: #1db954; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: #000; }
    </style>
</head>
<body>
    <div class="player">
        <h3>ROHLI PLAYER</h3>
        <h2 id="t">Memuat...</h2>
        <audio id="a" controls></audio><br>
        <div style="display: flex; gap: 10px; justify-content: center;">
            <button onclick="c(-1)">PREV</button>
            <button onclick="c(1)">NEXT</button>
        </div>
    </div>
    <script>
        const s = ["Arabic.mp3", "Benciku sangka sayang.mp3", "Evi Tamala Aku rindu padamu.mp3"];
        let i = 0;
        const a = document.getElementById('a'), t = document.getElementById('t');
        function l(x) { a.src = s[x]; t.innerText = s[x].replace('.mp3','').toUpperCase(); a.play(); }
        function c(d) { i = (i + d + s.length) % s.length; l(i); }
        t.innerText = s[0].replace('.mp3','').toUpperCase(); a.src = s[0];
    </script>
</body>
</html>
