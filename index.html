<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROHLI PLAYER PRO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        .now-playing { padding: 30px 20px; text-align: center; background: linear-gradient(180deg, #1db95433 0%, #000 100%); }
        #t { font-size: 1.1rem; font-weight: bold; margin-bottom: 20px; color: #1db954; }
        audio { width: 100%; filter: invert(1); margin-bottom: 15px; }
        .controls { display: flex; gap: 10px; justify-content: center; align-items: center; margin-bottom: 15px; }
        button { padding: 10px 15px; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; background: #1db954; color: #000; font-size: 0.8rem; }
        .btn-opt { background: #333; color: #fff; width: 50px; }
        .active-opt { background: #1db954 !important; color: #000 !important; }
        .playlist-container { flex-grow: 1; background: #121212; padding: 20px; overflow-y: auto; border-top: 1px solid #333; }
        .song-item { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #1f1f1f; }
        .song-item.active { color: #1db954; background: #181818; }
    </style>
</head>
<body>
    <div class="now-playing">
        <h2 id="t">Memuat...</h2>
        <audio id="a" controls></audio>
        <div class="controls">
            <button class="btn-opt" id="btnS" onclick="toggleS()">🔀</button>
            <button onclick="c(-1)">PREV</button>
            <button onclick="c(1)">NEXT</button>
            <button class="btn-opt" id="btnR" onclick="toggleR()">🔁</button>
        </div>
    </div>
    <div class="playlist-container" id="playlist"></div>

    <script>
        const s = ["Arabic.mp3", "Benciku sangka sayang.mp3", "Evi Tamala Aku rindu padamu.mp3"];
        let i = 0, isS = false, isR = false;
        const a = document.getElementById('a'), t = document.getElementById('t'), p = document.getElementById('playlist');

        function build() {
            p.innerHTML = s.map((n, idx) => `
                <div class="song-item ${idx === i ? 'active' : ''}" onclick="l(${idx})">
                    ${idx + 1}. ${n.replace('.mp3', '')}
                </div>`).join('');
        }
        function l(x) { i = x; a.src = s[i]; t.innerText = s[i].replace('.mp3','').toUpperCase(); build(); a.play(); }
        function c(d) {
            if (isS && d > 0) i = Math.floor(Math.random() * s.length);
            else i = (i + d + s.length) % s.length;
            l(i);
        }
        function toggleS() { isS = !isS; document.getElementById('btnS').classList.toggle('active-opt'); }
        function toggleR() { isR = !isR; document.getElementById('btnR').classList.toggle('active-opt'); }
        
        a.onended = () => { if (isR) l(i); else c(1); };

        l(0);
    </script>
</body>
</html>
