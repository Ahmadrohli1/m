<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROHLI PLAYER PRO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: url('Cantik.jpg') no-repeat center center fixed; background-size: cover; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.7)); z-index: 1; }
        .content { position: relative; z-index: 10; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }

        .header { display: flex; justify-content: space-between; padding: 20px; align-items: center; }
        .brand { font-size: 10px; letter-spacing: 4px; opacity: 0.5; }

        /* PERUBAHAN: Padding bawah dinaikkan ke 100px agar jauh dari tombol navigasi HP */
        .main-player { padding: 0 30px 100px 30px; text-align: center; }
        
        #t-box { width: 100%; overflow: hidden; white-space: nowrap; margin-bottom: 15px; height: 20px; }
        #t { display: inline-block; color: rgba(255,255,255,0.9); font-size: 0.75rem; letter-spacing: 1px; font-weight: bold; text-shadow: 1px 1px 3px rgba(0,0,0,0.5); }
        .marquee { animation: marquee 15s linear infinite; padding-left: 100%; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        .prog-box { width: 100%; margin-bottom: 20px; }
        #progress { width: 100%; accent-color: #1db954; cursor: pointer; height: 2px; }
        .times { display: flex; justify-content: space-between; font-size: 10px; margin-top: 8px; opacity: 0.6; font-family: monospace; }

        .controls { display: flex; gap: 20px; align-items: center; justify-content: center; }
        .btn-p { width: 60px; height: 60px; border-radius: 50%; background: #1db954; border: none; font-size: 24px; color: #fff; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.4); transition: 0.2s; }
        .btn-p:active { transform: scale(0.9); }
        .btn-s { background: none; border: none; color: #fff; font-size: 30px; cursor: pointer; opacity: 0.8; }
        .btn-opt { background: none; border: none; color: #fff; font-size: 18px; opacity: 0.3; cursor: pointer; }
        .active-opt { opacity: 1; color: #1db954; }

        .sidebar { position: fixed; top: 0; right: -100%; width: 100%; height: 100%; background: rgba(0,0,0,0.95); transition: 0.4s; z-index: 100; padding: 25px; display: flex; flex-direction: column; }
        .sidebar.active { right: 0; }
        #src { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; margin: 20px 0; background: #111; color: #fff; outline: none; }
        .list-container { flex-grow: 1; overflow-y: auto; }
        .song-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #222; }
        .song-info { flex-grow: 1; cursor: pointer; font-size: 14px; opacity: 0.8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 10px; }
        .act-btn { background: none; border: none; color: #fff; font-size: 18px; margin-left: 15px; text-decoration: none; opacity: 0.6; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="content">
        <div class="header">
            <div class="brand">ROHLI PLAYER PRO</div>
            <button onclick="toggleM()" style="background:none; border:none; color:#1db954; font-size:28px">☰</button>
        </div>
        <div class="main-player">
            <div id="t-box"><div id="t">SIAP DIPUTAR</div></div>
            <div class="prog-box">
                <input type="range" id="progress" value="0" step="0.1">
                <div class="times"><span id="curr">0:00</span><span id="dur">0:00</span></div>
            </div>
            <div class="controls">
                <button id="shuf" class="btn-opt" onclick="isS=!isS; this.classList.toggle('active-opt',isS)">🔀</button>
                <button class="btn-s" onclick="c(-1)">⏮</button>
                <button class="btn-p" id="pB" onclick="tP()">▶</button>
                <button class="btn-s" onclick="c(1)">⏭</button>
                <button id="rep" class="btn-opt" onclick="isR=!isR; this.classList.toggle('active-opt',isR)">🔁</button>
            </div>
        </div>
    </div>
    <div class="sidebar" id="sb">
        <div style="display:flex; justify-content:space-between; align-items:center">
            <h2 style="font-size:1.2rem; color:#1db954">DAFTAR LAGU</h2>
            <button onclick="toggleM()" style="background:none; border:none; color:#ff4d4d; font-size:35px">&times;</button>
        </div>
        <input type="text" id="src" placeholder="Cari judul lagu..." oninput="bL()">
        <div class="list-container" id="list"></div>
    </div>
    <audio id="a"></audio>
    <script>
        const a=document.getElementById('a'), t=document.getElementById('t'), pB=document.getElementById('pB'), l=document.getElementById('list'), sb=document.getElementById('sb'), src=document.getElementById('src'), prg=document.getElementById('progress'), curT=document.getElementById('curr'), durT=document.getElementById('dur');
        let s=['9mm__n3CvFYuyTLQ_.mp3','ALMA_ESBEYE___TAMALY_MA_AK______________320_.mp3','Aapke_Pyaar_Mein___Alka_Yagnik___Evergreen_Love_Song___Raaz___2002.mp3','Airmata_Di_Hari_Persandinganmu__Wzeaq0qWzAw_.mp3','Arabic.mp3','Astrid_S___Hurts_So_Good__Lyrics_.mp3','BRODYAGA_FUNK__xDtxAHzdaY0_.mp3','Benciku_sangka_sayang.mp3','Billie_Eilish__Khalid___lovely.mp3','Billie_Eilish___Happier_Than_Ever.mp3','Billie_Eilish___Happier_Than_Ever__Live_at_Lollapalooza_Brazil_2023___HD_.mp3','Billie_Eilish___WILDFLOWER__Music_Video_.mp3','Billie_Eilish___party_favor__Lyrics_.mp3','Bre__Petrunko__usQvJAgblVE_.mp3','CLNDK_STREET_BOYS___ADIZ_REMIX_FEAT_RSTU_REMIX____ZYtpQFfXWUA_.mp3','Crystal______X________TikTok___Clean_Audio_.mp3','DJ_ARIA_FREAKS_STADIUM_BREAKBEAT_REMIX_FULL_MELODY_TERBARU_2024_FULL_BASS_VIRAL_TIKTOK__FMnNZop_4q4_.mp3','DJ_KEMATIAN_SOUND_BJORKA_FYP_VIRAL_TIKTOK_2023_YANG_KALIAN_CARI____faSYmRasQbs_.mp3','DJ_OLD_BURN__oVHxDACdjT4_.mp3','DJ_SLOW_MAKE_IT_BUN_DEM___SKRILLEX_LAGU_VIRAL_TIK_TOK__xb9wEJlyCKU_.mp3','DJ_YA_ODNA_X_THE_DRUM_BREAKBEAT_FULL_BASS_TERBARU_2024___.mp3','DJ_YOU_LL_BE_IN_MY_HEART_BY_DJ_CANTIK_FULL_BASS_VIRAL_TIKTOK__CWl_va7levc_.mp3','Dhoom_Machale_Sunidhi_Chauhan_128_Kbps.mp3','Distant_Echoes__Slowed___Reverb___vA3praIBO8c_.mp3','Dj_Paijo___Zaskia_Gotik____Gamelan_Mumet____2022_YouTube_Viral_song__1.__Il9G_2laOEw_.mp3','Drive_Forever_Lyrics___Russian_remix_with_English_Translation.mp3','Dynasty__Official_Music_Video____MIIA.mp3','Egzod___Maestro_Chives___Royalty__ft._Neoni___Official_Lyric_Video_.mp3','Elley_Duh____MIDDLE_OF_THE_NIGHT__Official_Video_.mp3','Elvy_Sukaesih___Pecah_Seribu__Lirik_Lagu__Hasratku_ingin_bercermin_Tapi_cerminku_pecah_seribu.mp3','Evi_Tamala_Aku_rindu_padamu.mp3','Full_Video__Har_Dil_Jo_Pyar_Karega_Title_Song__Salman_Khan_Rani_Mukherjee__Udit_Narayan__Alka_Yagnik.mp3','GHOSTEMANE___FED_UP__OFFICIAL_MUSIC_VIDEO___p0lbm5J0uUs_.mp3','GORESAN_CINTA__RnUP4xOAVfQ_.mp3','Gangsta_s_Paradise___5qqrMu_AZc_.mp3','Gubuk_Jadi_Istana KI__Slowed_.mp3','TOREH_SEMBILU__u9rK3MV1n_4_.mp3','Terbuai_mimpi.mp3','Terguncang.mp3','Trauma.mp3','Yaa_toiba.mp3','You_ll_Be_in_My_Heart__Bl0Gtp5FMd4_.mp3','Zaenal.mp3','________________Slowed___jq0pIc9qqO8_.mp3','ytmp3free.cc_rhiena_goresan_cinta_official_music_video_youtubemp3free.org.mp3'], i=0, isR=false, isS=false;
        function toggleM() { sb.classList.toggle('active'); if(sb.classList.contains('active')) bL(); }
        function fmt(s) { if(!s || isNaN(s)) return "0:00"; let m=Math.floor(s/60), sec=Math.floor(s%60); return m+":"+(sec<10?"0"+sec:sec); }
        function bL() {
            let f=src.value.toLowerCase();
            l.innerHTML = s.filter(n=>n.toLowerCase().includes(f)).map(n=>{
                let x=s.indexOf(n);
                return `<div class="song-item">
                    <div class="song-info" onclick="lS(${x});toggleM()">${n.replace('.mp3','').replace(/_/g,' ')}</div>
                    <div style="display:flex">
                        <a href="${n}" download class="act-btn">📥</a>
                        <button class="act-btn" style="color:#ff4d4d" onclick="delS(${x})">🗑</button>
                    </div>
                </div>`;
            }).join('');
        }
        function delS(x) { if(confirm("Hapus lagu ini?")) { s.splice(x,1); bL(); } }
        function lS(x) { 
            i=x; a.src=s[i]; 
            let name = s[i].replace('.mp3','').replace(/_/g,' ').toUpperCase();
            t.innerText = name; t.className = name.length > 20 ? 'marquee' : '';
            a.play(); pB.innerText="⏸"; 
        }
        function tP() { if(a.src===''){if(s.length>0)lS(0)} else if(a.paused){a.play();pB.innerText="⏸"} else {a.pause();pB.innerText="▶"} }
        function c(d) { if(isS && d>0) i=Math.floor(Math.random()*s.length); else i=(i+d+s.length)%s.length; lS(i); }
        a.ontimeupdate = () => { if(!isNaN(a.duration)) { prg.value = (a.currentTime/a.duration)*100; curT.innerText = fmt(a.currentTime); durT.innerText = fmt(a.duration); } };
        prg.oninput = () => { a.currentTime = (prg.value/100) * a.duration; };
        a.onended=()=>{ if(isR)a.play(); else c(1); };
    </script>
</body>
</html>
